title: FAQ
fields:
  -
    handle: anchor
    field:
      type: text
      display: Anchor
  -
    handle: title
    field:
      type: text
      display: Title
  -
    handle: items
    field:
      type: replicator
      display: Questions
      collapse: true
      sets:
        item:
          display: Question
          fields:
            -
              handle: title
              field:
                type: text
                display: Question
                required: true
                validate:
                  - required
            -
              handle: answer
              field:
                type: bard
                display: Answer
                buttons:
                  - bold
                  - anchor
                  - removeformat
                toolbar_mode: floating
                link_collections:
                  - pages
                remove_empty_nodes: true
