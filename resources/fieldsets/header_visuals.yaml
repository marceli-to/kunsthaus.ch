title: 'Header Visuals'
fields:
  -
    handle: visuals
    field:
      type: replicator
      display: 'Header Visuals'
      collapse: true
      sets:
        main:
          display: Hauptbereich
          sets:
            visual:
              display: Visual
              fields:
                -
                  handle: mobile
                  field:
                    type: assets
                    container: assets
                    max_files: 1
                    display: Mobile
                    validate:
                      - required
                    instructions: 'Ideal ratio is 10/16'
                -
                  handle: desktop
                  field:
                    type: assets
                    container: assets
                    max_files: 1
                    display: Desktop
                    validate:
                      - required
                    instructions: 'Ideal ratio is 2/1'
