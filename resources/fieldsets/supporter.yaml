title: Supporter
fields:
  -
    handle: title
    field:
      type: text
      display: Title
  -
    handle: presidium
    field:
      type: replicator
      display: Co-Präsidium
      collapse: true
      sets:
        member:
          display: Member
          fields:
            -
              handle: image
              field:
                type: assets
                container: assets
                max_files: 1
                display: Image
            -
              handle: name
              field:
                type: text
                display: Name
                required: true
                validate:
                  - required
  -
    handle: committee_title
    field:
      type: text
      display: 'Komitee Title'
  -
    handle: committee
    field:
      type: replicator
      display: Komitee
      collapse: true
      sets:
        member:
          display: Member
          fields:
            -
              handle: name
              field:
                type: text
                display: Name
                required: true
                validate:
                  - required
            -
              handle: position
              field:
                type: text
                display: Position
