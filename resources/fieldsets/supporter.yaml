title: Supporter
fields:
  -
    handle: title
    field:
      type: text
      display: Title
  -
    handle: presidium
    field:
      type: replicator
      display: Co-Präsidium
      collapse: true
      sets:
        member:
          display: Member
          fields:
            -
              handle: image
              field:
                type: assets
                container: assets
                max_files: 1
                display: Image
            -
              handle: name
              field:
                type: text
                display: Name
                required: true
                validate:
                  - required
  -
    handle: photobox_title
    field:
      type: text
      display: 'Photobox Title'
      instructions: 'Überschrift über der Foto-Wall (Standard: «Unterstützende»).'
  -
    handle: photobox_images
    field:
      type: replicator
      display: 'Photobox images'
      collapse: true
      sets:
        image:
          display: Image
          fields:
            -
              handle: image
              field:
                type: assets
                container: assets
                max_files: 1
                display: Image
            -
              handle: firstname
              field:
                type: text
                display: Firstname
            -
              handle: name
              field:
                type: text
                display: Name
  -
    handle: committee_title
    field:
      type: text
      display: 'Komitee Title'
  -
    handle: committee_text
    field:
      type: bard
      display: 'Komitee (Liste)'
      instructions: 'Unterstützende als Aufzählung erfassen, pro Zeile «Name, Titel». Wenn ausgefüllt, wird diese Liste anstelle der alten Komitee-Einträge angezeigt.'
      buttons:
        - bold
        - italic
        - unorderedlist
        - removeformat
      toolbar_mode: floating
      remove_empty_nodes: true
      collapse: true
  -
    handle: committee
    field:
      type: replicator
      display: 'Komitee (alt)'
      instructions: 'Wird nur noch angezeigt, solange «Komitee (Liste)» leer ist.'
      collapse: true
      sets:
        member:
          display: Member
          fields:
            -
              handle: name
              field:
                type: text
                display: Name
                required: true
                validate:
                  - required
            -
              handle: position
              field:
                type: text
                display: Position
  -
    handle: logos_title
    field:
      type: text
      display: 'Logos Title'
      instructions: 'Überschrift über dem Logo-Teppich (z. B. «Unterstützende Organisationen»).'
  -
    handle: logos
    field:
      type: replicator
      display: 'Supporter Logos'
      instructions: 'Logos unterstützender Parteien und Organisationen. Werden vier pro Zeile dargestellt, direkt nach der Komitee-Liste.'
      collapse: true
      sets:
        logo:
          display: Logo
          fields:
            -
              handle: image
              field:
                type: assets
                container: assets
                max_files: 1
                display: Logo
                instructions: 'PNG (transparent) oder SVG empfohlen.'
                required: true
                validate:
                  - required
            -
              handle: name
              field:
                type: text
                display: Name
                instructions: 'Name der Organisation – wird als Alt-Text verwendet.'
            -
              handle: url
              field:
                type: text
                display: 'Link (optional)'
                instructions: 'Optionaler Link zur Organisation (inkl. https://).'
