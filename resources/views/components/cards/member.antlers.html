<article class="flex flex-col">

  {{ if image }}
    {{ partial:components/media/image
      :image="image"
      :alt="name"
      sizes="(min-width: 768px) 25vw, 100vw"
      wrapperClass="mb-12 md:mb-16 xl:mb-20"
    }}
  {{ /if }}

  {{ partial:components/headings/h3 size="xs" class="mb-6 md:mb-8 xl:mb-12" }}
    {{ name }}
  {{ /partial:components/headings/h3 }}

</article>
