title: 'Generiertes Bild'
# Records are created only via /api/submit — hide the blueprint so Runway drops
# the "Create" button (and blocks create server-side). Editing/deleting the
# existing records is unaffected.
hide: true
tabs:
  main:
    display: Bild
    sections:
      -
        fields:
          -
            # Clickable title column in the listing (full name, from the model's
            # `title` accessor). Hidden in the edit form and never saved — it has
            # no DB column. `title_field` in config/runway.php points here.
            handle: title
            field:
              type: text
              display: Name
              listable: true
              visibility: hidden
              save: false
          -
            handle: final_url
            field:
              type: image_preview
              display: 'Generiertes Bild'
              text: 'In voller Grösse öffnen'
              visibility: read_only
          -
            handle: moderation
            field:
              type: moderation_actions
              display: 'Freigabe'
              save: false
          -
            handle: first_name
            field:
              type: readonly_value
              display: Vorname
              width: 50
          -
            handle: last_name
            field:
              type: readonly_value
              display: Name
              width: 50
          -
            handle: user_email
            field:
              type: readonly_value
              display: E-Mail
              width: 50
          -
            handle: ja_style
            field:
              type: readonly_value
              display: 'JA-Stil'
              width: 50
          -
            handle: background_removed
            field:
              type: readonly_value
              as: bool
              display: 'Hintergrund entfernt'
              width: 50
          -
            handle: created_at
            field:
              type: readonly_value
              as: datetime
              display: 'Eingereicht am'
              width: 50
              listable: true
          -
            handle: published_at
            field:
              type: readonly_value
              as: datetime
              display: 'Veröffentlicht am'
              width: 50
          -
            handle: notified_at
            field:
              type: readonly_value
              as: datetime
              display: 'Benachrichtigt am'
              width: 50
