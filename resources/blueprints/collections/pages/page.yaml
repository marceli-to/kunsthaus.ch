title: Page
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: Title
              validate:
                - required
          -
            handle: blocks
            field:
              type: replicator
              display: 'Content Blocks'
              collapse: true
              sets:
                main:
                  display: Main
                  sets:
                    intro:
                      display: Intro
                      instructions: 'Add an intro section with a call to action'
                      icon: fieldtype-textarea
                      fields:
                        - import: intro
                    explainer:
                      display: Explainer
                      instructions: 'A titled rich text section explaining the vote'
                      icon: fieldtype-text
                      fields:
                        - import: explainer
                    reasons:
                      display: Reasons
                      instructions: 'Reasons with speech bubbles and a closing statement'
                      icon: comment
                      fields:
                        - import: reasons
                    faq:
                      display: FAQ
                      instructions: 'A question with a rich text answer'
                      icon: collapse
                      fields:
                        - import: faq
                    posts:
                      display: Posts
                      instructions: 'Add a preview for blog posts'
                      icon: layout-grid
                      fields:
                        - import: posts
                    supporter:
                      display: Supporter
                      instructions: 'Co-Präsidium cards and Komitee member list'
                      icon: user-group
                      fields:
                        - import: supporter
  settings:
    display: Settings
    sections:
      -
        display: SEO
        fields:
          - import: seo
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
              show_regenerate: true
      -
        display: Template
        fields:
          -
            handle: template
            field:
              type: template
              display: Template
