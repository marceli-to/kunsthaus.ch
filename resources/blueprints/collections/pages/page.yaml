title: Page
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: Title
              validate:
                - required
          -
            handle: blocks
            field:
              type: replicator
              display: 'Content Blocks'
              collapse: true
              sets:
                main:
                  display: Main
                  sets:
                    header_visuals:
                      display: 'Header Visuals'
                      instructions: 'Header visuals with a mobile and desktop image each'
                      icon: media-image-picture-gallery
                      fields:
                        - import: header_visuals
                    intro:
                      display: Intro
                      instructions: 'Add an intro section with a call to action'
                      icon: fieldtype-textarea
                      fields:
                        - import: intro
                    explainer:
                      display: Explainer
                      instructions: 'A titled rich text section explaining the vote'
                      icon: fieldtype-text
                      fields:
                        - import: explainer
                    privacy:
                      display: Privacy
                      instructions: 'A titled rich text section (bard also allows H1)'
                      icon: fieldtype-text
                      fields:
                        - import: privacy
                    reasons:
                      display: Reasons
                      instructions: 'Reasons with speech bubbles and a closing statement'
                      icon: mail-chat-bubble-text
                      fields:
                        - import: reasons
                    faq:
                      display: FAQ
                      instructions: 'A question with a rich text answer'
                      icon: collapse
                      fields:
                        - import: faq
                    posts:
                      display: Posts
                      instructions: 'Add a preview for blog posts'
                      icon: layout-grid
                      fields:
                        - import: posts
                    supporter:
                      display: Supporter
                      instructions: 'Co-Präsidium cards, Komitee member list and supporter logos'
                      icon: fieldtype-users
                      fields:
                        - import: supporter
                    jatelier:
                      display: JAtelier
                      instructions: 'The image generator: explainer + steps and the upload/style/create form'
                      icon: hero-image-above-text
                      fields:
                        - import: jatelier
  settings:
    display: Settings
    sections:
      -
        display: SEO
        fields:
          - import: seo
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
              show_regenerate: true
      -
        display: Template
        fields:
          -
            handle: template
            field:
              type: template
              display: Template
