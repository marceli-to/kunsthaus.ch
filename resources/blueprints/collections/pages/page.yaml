title: Page
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: Title
              validate:
                - required
          -
            handle: blocks
            field:
              type: replicator
              display: 'Content Blocks'
              collapse: true
              sets:
                main:
                  display: Main
                  sets:
                    editor:
                      display: 'Rich Text'
                      instructions: 'A rich text block'
                      icon: text
                      fields:
                        -
                          import: editor
                    faq:
                      display: FAQ
                      instructions: 'A question with a rich text answer'
                      icon: help
                      fields:
                        -
                          import: faq
  settings:
    display: Settings
    sections:
      -
        display: Template
        fields:
          -
            handle: template
            field:
              type: template
              display: Template
      -
        display: SEO
        fields:
          -
            import: seo
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
              show_regenerate: true
